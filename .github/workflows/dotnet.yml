name: .NET Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest  # WPF REQUIRES WINDOWS

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: Restore dependencies
      run: dotnet restore POE_Part2/POE_Part2.csproj
    
    - name: Build
      run: dotnet build POE_Part2/POE_Part2.csproj --configuration Release --no-restore
