name: .NET Build

on:
  push:
    branches: [ master ]      # CHANGED: main → master
  pull_request:
    branches: [ master ]      # CHANGED: main → master

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: Restore dependencies
      run: dotnet restore POE_Part2/POE_Part2.csproj
    
    - name: Build
      run: dotnet build POE_Part2/POE_Part2.csproj -p:EnableWindowsTargeting=true --configuration Release --no-restore
