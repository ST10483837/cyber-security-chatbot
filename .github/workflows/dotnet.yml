name: .NET Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build cyber-security-chatbot.sln --configuration Release --no-restore

    - name: Build POE_Part2 project directly
      run: dotnet build POE_Part2/POE_Part2.csproj --configuration Release --no-restore
